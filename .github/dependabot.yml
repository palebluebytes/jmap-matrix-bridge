version: 2
updates:
  # Rust dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps" # Conventional Commits → release-plz changelog "deps" group

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
