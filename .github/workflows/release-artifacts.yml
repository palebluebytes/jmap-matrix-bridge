name: Release artifacts

# Fires when release-plz pushes a vX.Y.Z tag (via the PAT in release-plz.yml).
# Builds the static binaries and OCI images from the flake for both arches,
# attaches the binaries to the GitHub Release, and publishes a multi-arch image
# to ghcr.io. See ADR-0008.

on:
  push:
    tags: ['v*']
  workflow_dispatch: # allow re-running against an existing tag ref

permissions:
  contents: write # upload release assets
  packages: write # push images to ghcr.io

jobs:
  build:
    name: build ${{ matrix.system }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write # upload release assets
      packages: write # push images to ghcr.io
      id-token: write # OIDC for build-provenance attestation
      attestations: write # record the attestation
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
            arch: amd64
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: cachix/cachix-action@v17
        with:
          name: palebluebytes
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # ── Static binary → GitHub Release asset ───────────────────────────────
      - name: Build static binary
        run: nix build .#static -L

      - name: Stage binary + checksum
        run: |
          bin="jmap-matrix-bridge-${GITHUB_REF_NAME}-${{ matrix.system }}"
          install -m755 result/bin/jmap-matrix-bridge "$bin"
          sha256sum "$bin" > "$bin.sha256"

      # Provenance attestation: proves the binary was built by THIS workflow from
      # this repo/commit, verifiable with `gh attestation verify <bin> --repo
      # palebluebytes/jmap-matrix-bridge`. The .sha256 only proves integrity; this
      # proves authenticity (keyless via OIDC/Sigstore — no key to manage).
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: jmap-matrix-bridge-${{ github.ref_name }}-${{ matrix.system }}

      - name: Upload binary to the release
        run: |
          bin="jmap-matrix-bridge-${GITHUB_REF_NAME}-${{ matrix.system }}"
          gh release upload "$GITHUB_REF_NAME" "$bin" "$bin.sha256" --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      # ── Per-arch OCI image → ghcr.io ───────────────────────────────────────
      - name: Build OCI image
        run: nix build .#dockerImage -L -o image.tar.gz

      - name: Push per-arch image
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          img="ghcr.io/${{ github.repository }}"
          docker load < image.tar.gz
          docker tag jmap-matrix-bridge:latest "$img:${GITHUB_REF_NAME}-${{ matrix.arch }}"
          docker push "$img:${GITHUB_REF_NAME}-${{ matrix.arch }}"

  manifest:
    name: multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write # push the manifest + attestation referrer
      id-token: write # OIDC for build-provenance attestation
      attestations: write # record the attestation
    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
    steps:
      - name: Combine per-arch images into a multi-arch tag
        id: manifest
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          img="ghcr.io/${{ github.repository }}"
          tag="${GITHUB_REF_NAME}"
          # Both :tag and :latest reference the same index, so they share one
          # digest — capture it (last sha256 line) for the attestation subject.
          digest=""
          for target in "$tag" latest; do
            docker manifest create "$img:$target" \
              "$img:$tag-amd64" "$img:$tag-arm64"
            digest=$(docker manifest push "$img:$target" | grep -oE 'sha256:[a-f0-9]+' | tail -n1)
          done
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # Attest the multi-arch index by digest — this is what `pull ghcr.io/...:vX.Y.Z`
      # resolves to, so `gh attestation verify oci://...:vX.Y.Z` (or cosign) verifies
      # the image an operator actually runs. push-to-registry stores it as a referrer
      # using the docker login above.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
