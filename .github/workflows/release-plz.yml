name: Release-plz

# On every push to main, release-plz runs two things:
#   • release-pr — opens/updates the "release vX.Y.Z" PR (version bump + CHANGELOG)
#   • release    — when the release PR has merged (Cargo.toml version changed),
#                  creates the vX.Y.Z tag + GitHub Release.
# See ADR-0008 and release-plz.toml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Never cancel a release mid-flight; serialize runs on main instead.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history is required to build the changelog
          # A PAT or GitHub App token (NOT the default GITHUB_TOKEN): the tag this
          # job pushes must be able to trigger release-artifacts.yml, and the
          # release PR's CI must run — neither happens for GITHUB_TOKEN events.
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      # release-plz drives cargo to compute version bumps and edit Cargo.toml.
      - uses: dtolnay/rust-toolchain@stable

      # `git_only` mode (release-plz.toml) makes release-plz run `cargo package`
      # — a verify build of the crate — during version detection. Cache the
      # cargo registry + a fixed target dir so that compile is paid once, not on
      # every push to main. CARGO_TARGET_DIR pins the build output to the
      # workspace `target/` (release-plz packages into a temp worktree, which
      # would otherwise be uncacheable); rust-cache caches that by default.
      - uses: Swatinem/rust-cache@v2

      - name: Run release-plz
        uses: release-plz/action@v0.5
        # No `command:` → runs both `release-pr` and `release`.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          # No CARGO_REGISTRY_TOKEN — publish = false (no crates.io).
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
