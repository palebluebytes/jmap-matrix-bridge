# Cargo Configuration for JMAP-Matrix Bridge

# NOTE: the `mold` dev linker is intentionally NOT configured here. A committed
# `rustflags = -fuse-ld=mold` is read by every raw `cargo` invocation — including
# release-plz's `cargo package` (which runs on the unprivileged CI runner without
# mold) — and broke them. The flag now lives in the devShell's environment
# (flake.nix), so it applies to interactive dev builds only. The hermetic Nix
# package build strips `.cargo` entirely; see ADR-0008.

[alias]
# Fast and thorough Clippy check on all targets (lib, bin, integration tests)
clippy-all = "clippy --all-targets --all-features -- -D warnings"

# Check all targets without building
check-all = "check --all-targets --all-features"

# Run all unit and integration tests
test-all = "test --all-targets --all-features"

# Run all tests using cargo-nextest (highly recommended!)
nextest-all = "nextest run --all-targets --all-features"
