# Bacon configuration for JMAP-Matrix Bridge

default_job = "check"

[jobs.check]
command = ["cargo", "check-all", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy-all", "--color", "always"]
need_stdout = false

[jobs.test]
command = ["cargo", "test-all", "--color", "always"]
need_stdout = true

[jobs.nextest]
command = ["cargo", "nextest-all", "--color", "always"]
need_stdout = true
